<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tailwind Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-6 rounded-2xl shadow-lg w-80">
      <input
        id="display"
        class="w-full text-right text-2xl p-4 border rounded mb-4"
        type="text"
        disabled
      />
      <div class="grid grid-cols-4 gap-4 text-white text-xl">
        <button class="bg-gray-400 p-4 rounded" onclick="clearDisplay()">
          C
        </button>
        <button class="bg-gray-400 p-4 rounded" onclick="append('/')">÷</button>
        <button class="bg-gray-400 p-4 rounded" onclick="append('*')">×</button>
        <button class="bg-red-500 p-4 rounded" onclick="deleteChar()">⌫</button>

        <button class="bg-blue-500 p-4 rounded" onclick="append('7')">7</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('8')">8</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('9')">9</button>
        <button class="bg-gray-500 p-4 rounded" onclick="append('-')">−</button>

        <button class="bg-blue-500 p-4 rounded" onclick="append('4')">4</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('5')">5</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('6')">6</button>
        <button class="bg-gray-500 p-4 rounded" onclick="append('+')">+</button>

        <button class="bg-blue-500 p-4 rounded" onclick="append('1')">1</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('2')">2</button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('3')">3</button>
        <button
          class="bg-green-500 p-4 rounded row-span-2"
          onclick="calculate()"
        >
          =
        </button>

        <button
          class="bg-blue-500 p-4 rounded col-span-2"
          onclick="append('0')"
        >
          0
        </button>
        <button class="bg-blue-500 p-4 rounded" onclick="append('.')">.</button>
      </div>
      <p class="mt-4 text-center text-sm text-gray-500">Created by Pradyumna</p>
    </div>

    <script src="/assets/script/main.js"></script>
  </body>
</html>
